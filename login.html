<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LEVELUP AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        input::placeholder {
            color: #999;
        }
        .role-selector {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .role-option {
            flex: 1;
            position: relative;
        }
        .role-option input[type="radio"] {
            display: none;
        }
        .role-option label {
            margin: 0;
            padding: 12px 15px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .role-option input[type="radio"]:checked + label {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .signup-link a:hover {
            color: #764ba2;
        }
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎮 LEVELUP AI</h1>
            <p>Gamified Learning Platform</p>
        </div>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label>I am a:</label>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="student" name="role" value="student" checked>
                        <label for="student">Student</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="teacher" name="role" value="teacher">
                        <label for="teacher">Teacher</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-login">Login</button>
            <div class="loading" id="loading">Logging in...</div>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="index.html">Sign up here</a>
        </div>
    </div>

    <script src="gal_config.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMsg');
        const loadingDiv = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;

            errorDiv.classList.remove('show');

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            loadingDiv.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });

                const data = await response.json();
                loadingDiv.style.display = 'none';

                if (!response.ok || !data.ok) {
                    showError(data.msg || 'Login failed');
                    return;
                }

                // Store auth data
                localStorage.setItem('gal_token', data.token);
                localStorage.setItem('gal_uid', data.uid);
                localStorage.setItem('gal_name', data.name);
                localStorage.setItem('gal_role', role);

                // Redirect based on role
                if (role === 'teacher') {
                    window.location.href = '/teacher-dashboard.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                loadingDiv.style.display = 'none';
                showError('Network error. Please try again.');
                console.error(err);
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('show');
        }
    </script>
</body>
</html>
